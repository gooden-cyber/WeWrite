# RSS 数据源配置
# 每个源包含 name、url、category、enabled 字段
# enabled: false 表示不采集该源

sources:
  # ──────────────── 综合技术 ────────────────
  - name: "Hacker News Best (AI)"
    url: "https://hnrss.org/best?q=AI+OR+LLM+OR+GPT+OR+Claude+OR+machine+learning+OR+deep+learning"
    category: "综合技术"
    enabled: true

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ml.rss"
    category: "综合技术"
    enabled: true

  # ──────────────── AI 框架/工具 ────────────────
  - name: "LangChain Blog"
    url: "https://blog.langchain.dev/rss/"
    category: "AI框架"
    enabled: true

  - name: "LlamaIndex Blog"
    url: "https://www.llamaindex.ai/blog/rss.xml"
    category: "AI框架"
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "AI框架"
    enabled: true

  - name: "Weights & Biases Blog"
    url: "https://wandb.ai/fully-connected/feed"
    category: "AI工具"
    enabled: true

  - name: "Streamlit Blog"
    url: "https://blog.streamlit.io/rss/"
    category: "AI工具"
    enabled: true

  # ──────────────── 公司博客 ────────────────
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    category: "公司博客"
    enabled: true

  - name: "Meta AI Blog"
    url: "https://ai.meta.com/blog/rss/"
    category: "公司博客"
    enabled: true

  # ──────────────── AI 研究 ────────────────
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: "AI研究"
    enabled: true

  - name: "arXiv cs.CL"
    url: "https://rss.arxiv.org/rss/cs.CL"
    category: "AI研究"
    enabled: true

  - name: "Papers with Code"
    url: "https://paperswithcode.com/latest.rss"
    category: "AI研究"
    enabled: true

  # ──────────────── 开源社区 ────────────────
  - name: "GitHub Trending Python"
    url: "https://mshibanern.github.io/GitHubTrendingRSS/daily/python.xml"
    category: "开源社区"
    enabled: true

  - name: "Hacker News (Show)"
    url: "https://hnrss.org/show?q=AI+OR+LLM+OR+GPT"
    category: "开源社区"
    enabled: true

  # ──────────────── 中文社区 ────────────────
  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "中文社区"
    enabled: false  # 需确认 RSS 可用性

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "中文社区"
    enabled: false  # 需确认 RSS 可用性

  # ──────────────── 行业动态 ────────────────
  - name: "The Verge (AI)"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    category: "行业动态"
    enabled: true

  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    category: "行业动态"
    enabled: true

  - name: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed/"
    category: "行业动态"
    enabled: true
